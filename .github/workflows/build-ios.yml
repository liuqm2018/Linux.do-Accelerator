name: Build iOS (unsigned IPA)

on:
  workflow_dispatch:
  push:
    tags:
      - "ios-v*"

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build unsigned archive
        working-directory: ios
        run: |
          set -euo pipefail
          xcodebuild \
            -project LinuxdoAccelerator.xcodeproj \
            -scheme LinuxdoAccelerator \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/LinuxdoAccelerator.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            clean archive

      - name: Package unsigned IPA
        working-directory: ios
        run: |
          set -euo pipefail
          APP_PATH="build/LinuxdoAccelerator.xcarchive/Products/Applications/LinuxdoAccelerator.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "app not found at $APP_PATH"; ls -R build/LinuxdoAccelerator.xcarchive/Products || true; exit 1
          fi
          rm -rf Payload LinuxdoAccelerator-unsigned.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          zip -qry LinuxdoAccelerator-unsigned.ipa Payload
          echo "built:"; ls -lh LinuxdoAccelerator-unsigned.ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinuxdoAccelerator-ios-unsigned
          path: ios/LinuxdoAccelerator-unsigned.ipa
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/ios-v')
        uses: softprops/action-gh-release@v2
        with:
          files: ios/LinuxdoAccelerator-unsigned.ipa
