name: LinuxdoAccelerator
options:
  bundleIdPrefix: io.linuxdo.accelerator
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"
    # Unsigned build: we sign later with TrollStore / self-signed cert.
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""
    ENABLE_BITCODE: "NO"

targets:
  LinuxdoAccelerator:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
      - path: Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.linuxdo.accelerator
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/LinuxdoAccelerator.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Link the Rust core here too (RustCore.swift lives in Shared/, and the
        # app needs export_ca_der for the cert-install flow).
        SWIFT_INCLUDE_PATHS: $(SRCROOT)/Vendor
        LIBRARY_SEARCH_PATHS: $(SRCROOT)/Vendor
        OTHER_LDFLAGS: -llinuxdo_accelerator -lc++ -lresolv -framework Security -framework SystemConfiguration
    dependencies:
      - target: PacketTunnel
        embed: true
      - sdk: libc++.tbd
      - sdk: libresolv.tbd
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnel
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.linuxdo.accelerator.PacketTunnel
        INFOPLIST_FILE: PacketTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: PacketTunnel/PacketTunnel.entitlements
        # Link the Rust ECH core (liblinuxdo_accelerator.a, built by CI).
        SWIFT_INCLUDE_PATHS: $(SRCROOT)/Vendor
        LIBRARY_SEARCH_PATHS: $(SRCROOT)/Vendor
        OTHER_LDFLAGS: -llinuxdo_accelerator -lc++ -lresolv -framework Security -framework SystemConfiguration
    dependencies:
      - sdk: libc++.tbd
      - sdk: libresolv.tbd
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
